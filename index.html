<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爆速！ボールリフティングゲーム</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #2c3e50;
            color: white;
            font-family: sans-serif;
            overflow: hidden; /* スマホでスクロールしないように */
        }
        canvas {
            border: 4px solid #ecf0f1;
            border-radius: 15px; /* 角を丸くする（練習したやつ！） */
            margin-top: 20px;
            touch-action: none; /* スマホのタップ操作を安定させる */
        }
        .info {
            text-align: center; /* 中央寄せ（練習したやつ！） */
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="info">
        <h1>ボールリフティング</h1>
        <p>画面をタップしてボールを弾こう！</p>
    </div>

    <script>
        // --- JavaScript：ゲームのメイン処理 ---
        let ball;
        let score = 0;
        let gravity = 0.15; // 重力

        function setup() {
            // スマホの画面サイズに合わせる
            let canvasWidth = Math.min(windowWidth, 400);
            createCanvas(canvasWidth, 500);
            ball = {
                x: width / 2,
                y: height / 2,
                vx: 2,
                vy: 0,
                r: 25
            };
        }

        function draw() {
            background(44, 62, 80);

            // ボールの移動と重力
            ball.x += ball.x < 0 || ball.x > width ? (ball.vx *= -1) : ball.vx; 
            ball.vy += gravity;
            ball.y += ball.vy;

            // 壁での跳ね返り
            if (ball.x < ball.r || ball.x > width - ball.r) ball.vx *= -1;

            // ゲームオーバー判定
            if (ball.y > height) {
                fill(255, 0, 0);
                textSize(40);
                textAlign(CENTER);
                text("GAME OVER", width / 2, height / 2);
                textSize(20);
                text("Score: " + score, width / 2, height / 2 + 50);
                noLoop();
            }

            // ボールの描画
            fill(255, 204, 0);
            noStroke();
            ellipse(ball.x, ball.y, ball.r * 2);

            // スコア表示
            fill(255);
            textSize(24);
            textAlign(LEFT);
            text("Score: " + score, 20, 40);
        }

        // スマホのタップ・PCのクリック両方に対応
        function mousePressed() {
            let d = dist(mouseX, mouseY, ball.x, ball.y);
            if (d < ball.r * 2) { // 当たり判定を少し広めに設定
                ball.vy = -7; // 上に弾く
                ball.vx = random(-4, 4); // 横にランダムで飛ばす
                score++;
            }
            // ゲームオーバー後の再起動
            if (ball.y > height) {
                score = 0;
                ball.y = height / 2;
                ball.vy = 0;
                loop();
            }
        }
    </script>

    <script type="py">
        print("Game Engine (JavaScript) + Logic Helper (Python) is Ready!")
    </script>

</body>
</html>
